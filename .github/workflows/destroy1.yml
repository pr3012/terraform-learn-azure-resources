name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment (dev/prod)"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    # ✅ Uses GitHub Environment (dev or prod)
    environment: ${{ github.event.inputs.environment }}

    steps:

      # ✅ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Azure login using OIDC
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Terraform Init (Backend)
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=terraformstfs" \
            -backend-config="storage_account_name=tfbackendpr3012" \
            -backend-config="container_name=tfbackend" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}"

      # ✅ Terraform Validate
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # ✅ Terraform Format Check
      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -check

      # ✅ Terraform Plan
      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -destroy \
            -var="environment=${{ vars.ENV }}" \
            -var="admin_password=${{ secrets.VM_PASSWORD }}"

      # ✅ Terraform Apply
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -destroy -auto-approve \
            -var="environment=${{ vars.ENV }}" \
            -var="admin_password=${{ secrets.VM_PASSWORD }}"